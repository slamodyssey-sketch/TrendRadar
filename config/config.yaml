# config/config.yaml

push:
  telegram:
    enable: true
    bot_token: ${TELEGRAM_BOT_TOKEN}   # 使用 GitHub Secret
    chat_id: ${TELEGRAM_CHAT_ID}       # 使用 GitHub Secret

news:
  sources:
    - rss: https://hnrss.org/frontpage          # Hacker News
    - rss: https://www.zhihu.com/rss           # 知乎精选
    - rss: https://techcrunch.com/feed/       # TechCrunch
    - rss: https://www.coindesk.com/arc/outboundfeeds/rss/  # 比特币新闻
    - rss: https://www.36kr.com/feed           # 36氪新闻

ai_summary:
  enable: false
  model: gpt-3.5-turbo
  api_key: ${OPENAI_API_KEY}                 # GitHub Secret
  language: zh                               # 中文总结

filter_keywords:
  - AI
  - OpenAI
  - GitHub
  - Bitcoin
  - Apple
  - Guitar
  - Music gear
